<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#9824; Balatro GBA</title>
  <link rel="stylesheet" href="https://cdn.emulatorjs.org/stable/data/emulator.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100vh; }

    #hint {
      position: fixed; bottom: 14px; left: 14px; z-index: 9999;
      background: rgba(10,10,22,0.92); border: 1px solid rgba(232,168,56,0.5);
      border-radius: 8px; padding: 10px 14px;
      font: 0.75rem/1.7 'Segoe UI', sans-serif; color: #f0e6d3;
      backdrop-filter: blur(4px); transition: opacity 0.5s; cursor: pointer;
    }
    #hint.gone { opacity: 0; pointer-events: none; }
    #hint b { color: #e8a838; display: block; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .k { display: inline-block; background: #222240; border: 1px solid #444; border-radius: 3px; padding: 0 6px; font-family: monospace; color: #e8a838; margin-right: 4px; font-size: 0.72rem; }
  </style>
</head>
<body>

<div id="game"></div>

<div id="hint">
  <b>&#9824; Controls</b>
  <span class="k">Enter</span> Play Hand<br>
  <span class="k">Backspace</span> Discard<br>
  <span class="k">Space</span> Select Card<br>
  <span class="k">Esc</span> Deselect All<br>
  <span class="k">&#8593;&#8595;&#8592;&#8594;</span> Navigate
</div>

<!-- Load EmulatorJS scripts individually to avoid the min.js abort bug -->
<script src="https://cdn.emulatorjs.org/stable/data/src/emulator.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/nipplejs.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/shaders.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/storage.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/gamepad.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/GameManager.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/socket.io.min.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/compression.js"></script>

<script>
  // Auto-hide controls hint
  setTimeout(function(){ document.getElementById('hint').classList.add('gone'); }, 8000);
  document.getElementById('hint').onclick = function(){ this.classList.add('gone'); };

  // GBA button index → keyCode mapping (Steam-style)
  // 0=B 1=A 2=Select 3=Start 4=Up 5=Down 6=Left 7=Right 8=L 9=R
  window.EJS_emulator = new EmulatorJS('#game', {
    gameUrl:            'balatro-gba.gba',
    dataPath:           'https://cdn.emulatorjs.org/stable/data/',
    system:             'mgba',
    color:              '#e8a838',
    startOnLoad:        true,
    defaultControllers: {
      0: {
        0:  {"value": "escape",      "value2": "BUTTON_2"},   // B      = Esc
        1:  {"value": "space",       "value2": "BUTTON_4"},   // A      = Space
        2:  {"value": "shift",       "value2": "SELECT"},     // Select = Shift
        3:  {"value": "tab",         "value2": "START"},      // Start  = Tab
        4:  {"value": "up arrow",    "value2": "DPAD_UP"},    // Up
        5:  {"value": "down arrow",  "value2": "DPAD_DOWN"},  // Down
        6:  {"value": "left arrow",  "value2": "DPAD_LEFT"},  // Left
        7:  {"value": "right arrow", "value2": "DPAD_RIGHT"}, // Right
        8:  {"value": "enter",       "value2": "LEFT_TOP_SHOULDER"},  // L = Enter (Play)
        9:  {"value": "backspace",   "value2": "RIGHT_TOP_SHOULDER"}  // R = Backspace (Discard)
      },
      1: {}, 2: {}, 3: {}
    }
  });
</script>

</body>
</html>
