<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♠ Balatro GBA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      overflow: hidden;
    }

    /* Full-page emulator container */
    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Floating controls hint – bottom-left, auto-hides */
    #controls-hint {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 9999;
      background: rgba(13, 13, 26, 0.88);
      border: 1px solid #e8a83866;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.75rem;
      color: #f0e6d3;
      backdrop-filter: blur(6px);
      transition: opacity 0.4s;
      cursor: pointer;
      user-select: none;
    }
    #controls-hint.hidden { opacity: 0; pointer-events: none; }

    #controls-hint .title {
      color: #e8a838;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 3px 0;
    }

    .key {
      background: #2a2a4a;
      border: 1px solid #555;
      border-bottom: 2px solid #111;
      border-radius: 4px;
      padding: 1px 7px;
      font-family: monospace;
      font-size: 0.72rem;
      color: #e8a838;
      white-space: nowrap;
      min-width: 52px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- EmulatorJS renders into this div and takes over the full page -->
<div id="game"></div>

<!-- Floating keyboard legend (click to hide) -->
<div id="controls-hint" title="Klicken zum Ausblenden">
  <div class="title">&#9824; Controls</div>
  <div class="ctrl-row"><span class="key">Enter</span> Hand spielen</div>
  <div class="ctrl-row"><span class="key">Backspace</span> Abwerfen</div>
  <div class="ctrl-row"><span class="key">Space</span> Karte wählen</div>
  <div class="ctrl-row"><span class="key">Escape</span> Abwählen</div>
  <div class="ctrl-row"><span class="key">↑↓←→</span> Navigation</div>
</div>

<script>
  // Hide hint after 8 s or on click
  var hint = document.getElementById('controls-hint');
  hint.addEventListener('click', function() { hint.classList.add('hidden'); });
  setTimeout(function() { hint.classList.add('hidden'); }, 8000);

  // ── EmulatorJS config ──────────────────────────────────────────
  // Button index → key code  (mGBA / EmulatorJS)
  // 0 = B       27  Escape   (deselect all)
  // 1 = A       32  Space    (select / confirm)
  // 2 = Select  16  Shift
  // 3 = Start    9  Tab
  // 4 = Up      38  ArrowUp
  // 5 = Down    40  ArrowDown
  // 6 = Left    37  ArrowLeft
  // 7 = Right   39  ArrowRight
  // 8 = L       13  Enter    (play hand)
  // 9 = R        8  Backspace (discard)

  window.EJS_player        = "#game";
  window.EJS_core          = "mgba";
  window.EJS_gameUrl       = "balatro-gba.gba";
  window.EJS_pathtodata    = "https://cdn.emulatorjs.org/stable/data/";
  window.EJS_color         = "#e8a838";
  window.EJS_startOnLoaded = true;

  window.EJS_defaultControls = {
    "0": {
      "0": { "value": 27,  "value2": 0 },
      "1": { "value": 32,  "value2": 0 },
      "2": { "value": 16,  "value2": 0 },
      "3": { "value": 9,   "value2": 0 },
      "4": { "value": 38,  "value2": 0 },
      "5": { "value": 40,  "value2": 0 },
      "6": { "value": 37,  "value2": 0 },
      "7": { "value": 39,  "value2": 0 },
      "8": { "value": 13,  "value2": 0 },
      "9": { "value": 8,   "value2": 0 }
    }
  };
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
