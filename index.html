<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#9824; Balatro GBA</title>
  <link rel="stylesheet" href="https://cdn.emulatorjs.org/stable/data/emulator.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #game { position: fixed; inset: 0; width: 100vw; height: 100vh; }

    /* Action buttons – bottom center, over the game */
    #action-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 9000;
      transition: opacity 0.3s;
    }
    #action-bar.hide { opacity: 0; pointer-events: none; }

    .btn-action {
      padding: 10px 26px; border: none; border-radius: 6px;
      font: 700 0.92rem 'Segoe UI', sans-serif; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 3px 14px rgba(0,0,0,0.7); user-select: none;
      transition: transform 0.08s, filter 0.08s;
    }
    .btn-action:active { transform: scale(0.93); filter: brightness(0.8); }
    #btn-play    { background: #2a7a3b; color: #fff; }
    #btn-discard { background: #8b2020; color: #fff; }

    /* Toggle */
    #toggle-ui {
      position: fixed; top: 10px; right: 10px; z-index: 9999;
      background: rgba(10,10,22,0.7); border: 1px solid rgba(232,168,56,0.35);
      border-radius: 6px; padding: 4px 10px; color: #e8a838;
      font: 0.7rem 'Segoe UI', sans-serif; cursor: pointer; user-select: none;
    }

    /* Cursor crosshair over canvas so user knows they can click */
    #game canvas.ejs_canvas { cursor: pointer; }
  </style>
</head>
<body>

<div id="game"></div>

<div id="action-bar">
  <button class="btn-action" id="btn-play">&#9654; Play Hand</button>
  <button class="btn-action" id="btn-discard">&#10005; Discard</button>
</div>

<div id="toggle-ui">UI</div>

<!-- EmulatorJS scripts (individual to avoid min.js abort) -->
<script src="https://cdn.emulatorjs.org/stable/data/src/emulator.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/nipplejs.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/shaders.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/storage.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/gamepad.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/GameManager.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/socket.io.min.js"></script>
<script src="https://cdn.emulatorjs.org/stable/data/src/compression.js"></script>

<script>
  // ── GBA button indices ───────────────────────────────────────────
  // 0=B  1=A  2=Select  3=Start  4=Up  5=Down  6=Left  7=Right  8=L  9=R
  var BTN = { B:0, A:1, SEL:2, START:3, UP:4, DOWN:5, LEFT:6, RIGHT:7, L:8, R:9 };

  function tap(btn, ms) {
    ms = ms || 80;
    if (!window.EJS_emulator) return;
    EJS_emulator.simulateInput(0, btn, 1);
    setTimeout(function(){ EJS_emulator.simulateInput(0, btn, 0); }, ms);
  }

  // ── Canvas fullscreen fix ────────────────────────────────────────
  // Scale canvas so the GBA game area (3:2) fills the viewport (no black bars)
  function fixCanvas() {
    var canvas = document.querySelector('canvas.ejs_canvas');
    if (!canvas) { setTimeout(fixCanvas, 200); return; }

    var vw = window.innerWidth, vh = window.innerHeight;
    var cw = canvas.width, ch = canvas.height;
    var gameH = cw * (2 / 3);         // GBA is 3:2
    var scale  = Math.max(vw / cw, vh / gameH);
    var dW = cw * scale, dH = ch * scale;
    var gameDispH = gameH * scale;
    var top = (vh - gameDispH) / 2;   // centres game area vertically

    var p = canvas.parentElement;
    p.style.cssText = 'width:100%!important;height:100%!important;overflow:hidden!important;position:relative!important;';
    canvas.style.cssText =
      'position:absolute!important;' +
      'width:'  + dW  + 'px!important;' +
      'height:' + dH  + 'px!important;' +
      'left:'   + ((vw - dW) / 2) + 'px!important;' +
      'top:'    + top + 'px!important;' +
      'cursor:pointer;';

    // Store scale info for click mapping
    canvas._gbaScale = scale;
    canvas._gbaOffX  = (vw - dW) / 2;
    canvas._gbaOffY  = top;
    canvas._gbaW     = cw;
    canvas._gbaH     = ch;
    canvas._gbaGameH = gameH;

    attachClickHandler(canvas);
  }

  // ── Click-on-canvas → GBA card selection ────────────────────────
  // GBA Balatro hand cards sit in approximately the bottom 28% of the
  // 160-px-tall GBA screen, spread evenly across the full width.
  // We detect how far along the X axis the click landed and navigate
  // the in-game cursor to that slot, then press A.

  var cursorSlot = 1;
  var HAND_Y_START = 0.68; // GBA y > 68 % of screen height = hand area
  var MAX_CARDS    = 8;

  function attachClickHandler(canvas) {
    if (canvas._clickBound) return;
    canvas._clickBound = true;

    canvas.addEventListener('click', function(e) {
      if (!canvas._gbaScale) return;

      // Convert CSS click position → GBA pixel position
      var rect = canvas.getBoundingClientRect();
      var cssX  = e.clientX - rect.left;
      var cssY  = e.clientY - rect.top;

      // GBA coordinates
      var gbaX = (cssX / (canvas._gbaW * canvas._gbaScale)) * 240;
      var gbaY = (cssY / (canvas._gbaH * canvas._gbaScale)) * 160;

      // Only act in the hand-card zone (bottom ~32 % of GBA screen)
      if (gbaY < HAND_Y_START * 160) return;

      // Determine target slot from X position (cards evenly spaced)
      var slot = Math.max(1, Math.min(MAX_CARDS,
                   Math.ceil(gbaX / (240 / MAX_CARDS))));

      goToSlot(slot);
    });
  }

  function goToSlot(target) {
    if (!window.EJS_emulator) return;
    var delay = 0;

    // Reset cursor to leftmost card position
    for (var i = 0; i < MAX_CARDS; i++) {
      (function(d){ setTimeout(function(){ tap(BTN.LEFT, 55); }, d); })(delay);
      delay += 70;
    }
    // Navigate right to target slot
    for (var j = 1; j < target; j++) {
      (function(d){ setTimeout(function(){ tap(BTN.RIGHT, 55); }, d); })(delay);
      delay += 70;
    }
    // Press A to toggle selection
    setTimeout(function(){
      tap(BTN.A, 80);
      cursorSlot = target;
    }, delay + 30);
  }

  // ── Play / Discard buttons ───────────────────────────────────────
  document.getElementById('btn-play').addEventListener('mousedown', function(e){
    e.preventDefault(); tap(BTN.L); cursorSlot = 1;
  });
  document.getElementById('btn-discard').addEventListener('mousedown', function(e){
    e.preventDefault(); tap(BTN.R); cursorSlot = 1;
  });

  // Keyboard resets too
  document.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === 'Backspace') cursorSlot = 1;
  });

  // ── Toggle overlay ───────────────────────────────────────────────
  var uiOn = true;
  document.getElementById('toggle-ui').addEventListener('click', function(){
    uiOn = !uiOn;
    document.getElementById('action-bar').classList.toggle('hide', !uiOn);
    this.style.opacity = uiOn ? '1' : '0.4';
  });

  // ── Init emulator ────────────────────────────────────────────────
  window.EJS_emulator = new EmulatorJS('#game', {
    gameUrl:     'balatro-gba.gba',
    dataPath:    'https://cdn.emulatorjs.org/stable/data/',
    system:      'mgba',
    color:       '#e8a838',
    startOnLoad: true,
    defaultControllers: {
      0: {
        0: {"value": "escape",      "value2": "BUTTON_2"},
        1: {"value": "space",       "value2": "BUTTON_4"},
        2: {"value": "shift",       "value2": "SELECT"},
        3: {"value": "tab",         "value2": "START"},
        4: {"value": "up arrow",    "value2": "DPAD_UP"},
        5: {"value": "down arrow",  "value2": "DPAD_DOWN"},
        6: {"value": "left arrow",  "value2": "DPAD_LEFT"},
        7: {"value": "right arrow", "value2": "DPAD_RIGHT"},
        8: {"value": "enter",       "value2": "LEFT_TOP_SHOULDER"},
        9: {"value": "backspace",   "value2": "RIGHT_TOP_SHOULDER"}
      },
      1: {}, 2: {}, 3: {}
    }
  });

  fixCanvas();
  window.addEventListener('resize', fixCanvas);
</script>

</body>
</html>
